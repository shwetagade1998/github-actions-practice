name: smart pipeline
on: [push]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: run code lint
              run: |
                echo "simulating code linting"
                echo "linting complete.code looks clean"

    test:
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              
            - name: run test suite
              run: |
                echo "running unit and integration tests"
                echo "all tests passed successfully"

    summary:
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - name: determine branch type
              run: |
                if [ "${{ github.ref }}" = "main" ]; then
                   echo "BRANCH_TYPE=This is the main branch push." >> $GITHUB_ENV
                else
                   echo "BRANCH_TYPE=This is a feature branch push  (${{ github.ref_name }})." >> $GITHUB_ENV
                fi
            - name: print summary pipeline
              run: |
                echo "=== summary of the smart pipeline ==="
                echo "Branch type: $BRANCH_TYPE"
                echo "commit meassage: ${ {github.event.head_commit.message }}"