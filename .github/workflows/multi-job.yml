name: multi-job workflow
on:
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: print "building the app"
              run: echo "Building the app"

    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: print running test
              run: echo "Running tests"
    
    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: print deploying
              run: echo "Deploying"